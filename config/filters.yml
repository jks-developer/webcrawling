# 알림 필터링 키워드.
# - 제목 기준, 대소문자 무시, 부분 일치
# - include 가 비어 있으면 모든 글 통과 후 exclude 만 적용
# - 둘 다 있으면: (include 중 하나라도 매치) AND (exclude 어느 것도 매치 안 됨)

include: []
  # 예시:
  # - 청약
  # - 모집공고
  # - 1순위

# 완료/결과 알림은 제외 (당첨자 발표 등). 새 모집공고만 받음.
# '입주안내'/'입주 안내' 두 변형 모두 등록 — 필터는 공백 정규화 없이 부분 일치하므로,
# "입주안내문 게시" / "입주 안내문 게시" 양쪽을 잡으려면 둘 다 필요.
# '안내' 단독은 정상 모집공고(예: "○○ 주택특별공급 안내")도 다 매칭되므로 절대 추가 금지.
exclude:
  - 당첨자
  - 발표
  - 결과
  - 취소
  - 완료
  - 종료
  - 마감
  - 입주안내
  - 입주 안내
