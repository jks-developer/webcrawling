# 크롤링 대상 사이트 목록.
# 새 사이트를 추가하려면:
#   1) src/sites/<new_module>.py 에 SiteAdapter 구현
#   2) 아래 sites: 항목에 등록
#   3) enabled: true 로 켜기
#
# 참고: docs/ADD_SITE.md

sites:
  # 중소벤처기업부 경기지방청 게시판 (장기근속 중소기업 근로자 주택 특별공급)
  - key: mss_gyeonggi
    name: 중기부 경기 (특별공급)
    adapter: mss_gyeonggi.MssGyeonggi
    url: https://www.mss.go.kr/site/gyeonggi/ex/bbs/List.do?cbIdx=323
    selectors: {}   # 어댑터가 직접 처리 (custom)
    enabled: true

  # SH 서울주택도시공사 - 공고 및 공지 (분양/임대/특별공급/당첨자발표 통합 게시판)
  - key: sh_seoul
    name: SH 서울주택도시공사
    adapter: sh_seoul.SHSeoul
    url: https://www.i-sh.co.kr/main/lay2/program/S1T294C297/www/brd/m_247/list.do
    selectors: {}   # 어댑터가 직접 처리 (custom)
    enabled: true

  # GH 경기주택도시공사 - 분양/임대 공고 게시판
  - key: gh_gyeonggi
    name: GH 경기주택도시공사
    adapter: gh_gyeonggi.GHGyeonggi
    url: https://www.gh.or.kr/gh/announcement-of-salerental001.do
    selectors: {}   # 어댑터가 직접 처리 (custom)
    enabled: true

  # 청약홈 APT 분양/임대 (민영/공공 + 신혼/생애최초/신생아 특별공급 포함)
  - key: applyhome_apt
    name: 청약홈 APT 분양/임대
    adapter: applyhome.ApplyhomeApt
    url: https://www.applyhome.co.kr/ai/aia/selectAPTLttotPblancListView.do
    selectors: {}   # 어댑터가 직접 처리 (custom)
    enabled: true

  # 청약홈 APT 무순위/잔여세대 (무순위 사후, 취소후재공급, 불법행위 재공급)
  - key: applyhome_remndr
    name: 청약홈 APT 무순위/잔여세대
    adapter: applyhome.ApplyhomeRemndr
    url: https://www.applyhome.co.kr/ai/aia/selectAPTRemndrLttotPblancListView.do
    selectors: {}   # 어댑터가 직접 처리 (custom)
    enabled: true

  # 픽스처용 예시 어댑터. 새 사이트 추가 패턴 참고용.
  - key: example
    name: 예시 사이트 (스캐폴딩용 픽스처)
    adapter: example_site.ExampleSite
    url: file://tests/fixtures/sample.html
    selectors:
      row: "tr.item"
      title: "a.title"
      link: "a.title@href"
      date: "td.date"
      id: "a.title@data-id"
    enabled: false
